# CI: format, lint, typecheck, workspace tests (Vitest), Postgres integration,
# Docker image smoke builds, npm audit, and Playwright smoke.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Lint, format, typecheck, test, e2e, Docker
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: todo_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d todo_ci"
          --health-interval 4s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/todo_ci?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm exec --workspace=@todo/api -- prisma generate

      - name: Apply database migrations
        run: npm exec --workspace=@todo/api -- prisma migrate deploy

      - name: CI script (format, lint, typecheck, workspace tests)
        run: npm run ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: End-to-end smoke (Chromium projects only)
        run: npx playwright test -c tests/e2e/playwright.config.ts --project=chromium-desktop

      - name: Docker build API image
        run: docker build -f apps/api/Dockerfile -t todo-api:ci .

      - name: Docker build Web image
        run: docker build -f apps/web/Dockerfile -t todo-web:ci --build-arg VITE_API_URL=http://localhost:3000 .

      - name: npm audit (production)
        run: npm audit --omit=dev --audit-level=high
