# Continuous integration for the Todo monorepo (npm workspaces).
# Extend with Vitest, Playwright, Docker compose, and coverage gates when Phase 2+ lands.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Lint, format, typecheck, test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: CI script (format, lint, typecheck, test)
        run: npm run ci

      - name: npm audit (production)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: false
